<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ride Confirmed</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #052e16, #047857, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 28px;
      padding: 55px 40px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
      animation: popIn 0.7s ease;
    }

    .check {
      width: 86px;
      height: 86px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: white;
      color: #16a34a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: bold;
      box-shadow: 0 12px 35px rgba(255, 255, 255, 0.25);
    }

    h1 {
      font-size: 46px;
      margin: 0 0 16px;
    }

    p {
      font-size: 20px;
      color: #dcfce7;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status-box {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 28px;
      font-size: 16px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      color: #064e3b;
      background: white;
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(255, 255, 255, 0.3);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">✓</div>

    <h1>Ride Confirmed!</h1>

    <p>
      Your ride has been successfully booked and the event has been sent to Azure Event Hub.
    </p>

    <div class="status-box">
      ✅ Booking request processed successfully.
    </div>

    <a href="/" class="button">Book Another Ride</a>
  </div>
</body>
</html>
